name: Build DerivativeZero

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libdbus-1-3 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        working-directory: ./app
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name DerivativeZero \
            --icon=../docs/images/derivative-zero-icon.ico \
            --clean \
            --hidden-import=PyQt6.sip \
            --hidden-import=PyQt6.QtPrintSupport \
            main.py

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p dist/final

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            mv app/dist/DerivativeZero.exe dist/final/DerivativeZero-Windows.exe

          elif [[ "${{ runner.os }}" == "Linux" ]]; then
            mv app/dist/DerivativeZero dist/final/DerivativeZero-Linux
            chmod +x dist/final/DerivativeZero-Linux

          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            # PyInstaller создаёт .app в папке dist
            mv app/dist/DerivativeZero.app dist/final/DerivativeZero-macOS.app
            # упакуем в zip (иначе GitHub иногда ломает bundle)
            cd dist/final
            zip -r DerivativeZero-macOS.zip DerivativeZero-macOS.app
            rm -rf DerivativeZero-macOS.app
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DerivativeZero-${{ runner.os }}
          path: dist/final/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Debug files
        run: ls -R artifacts

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build — DerivativeZero
          prerelease: true
          overwrite_files: true
          files: |
            artifacts/DerivativeZero-Windows/DerivativeZero-Windows.exe
            artifacts/DerivativeZero-Linux/DerivativeZero-Linux
            artifacts/DerivativeZero-macOS/DerivativeZero-macOS.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}